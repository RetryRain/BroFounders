<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BroFounders</title>

    <style>
      body {
        margin: 0;
        background: #1b131f;
      }

      #splash {
        position: fixed;
        inset: 0;
        background: #1b131f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }

      #splash.hidden {
        opacity: 0;
        visibility: hidden;
      }

      #splash-logo {
        width: min(300px);
        height: auto;
        border-radius: 50%;
        animation: sn-pulse 1.8s ease-in-out infinite;
      }

      #splash-wordmark {
        font-family: "Inter", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: -0.3px;
      }

      #splash-wordmark span {
        color: rgba(255, 255, 255, 0.35);
        font-weight: 400;
      }

      @keyframes sn-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.55;
          transform: scale(0.93);
        }
      }
    </style>
  </head>

  <body>
    <!-- Splash Screen -->
    <div id="splash">
      <img id="splash-logo" src="/loading-logo.svg" alt="BroFounders" />

      <div id="splash-wordmark">Bro<span>Founders</span></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.addEventListener("load", () => {
        const splash = document.getElementById("splash");
        if (splash) splash.classList.add("hidden");
      });
    </script>
  </body>
</html>
